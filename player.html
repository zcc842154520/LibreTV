<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>LibreTV 播放器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0f1622; color: white; }
        .player-container { width: 100%; max-width: 1200px; margin: 0 auto; }
        #player { width: 100%; height: 60vh; }
        .loading-container {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center;
            background-color: rgba(0, 0, 0, 0.8); color: white; z-index: 100; flex-direction: column;
        }
        .loading-spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            border-top-color: #00ccff; animation: spin 1s ease-in-out infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-container {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; align-items: center; justify-content: center;
            background-color: rgba(0, 0, 0, 0.8); color: white; z-index: 100; flex-direction: column; text-align: center; padding: 1rem;
        }
        .error-icon { font-size: 48px; margin-bottom: 10px; }
        .episode-active { background-color: #3b82f6 !important; border-color: #60a5fa !important; }
        .episode-grid { max-height: 30vh; overflow-y: auto; padding: 1rem 0; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00ccff; }
        input:checked + .slider:before { transform: translateX(22px); }
        .shortcut-hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 1rem 2rem; border-radius: 0.5rem; font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }
        .shortcut-hint.show { opacity: 1; }
        .player-container:-webkit-full-screen, .player-container:fullscreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10000; background-color: #000; }
        .player-container:-webkit-full-screen #player, .player-container:fullscreen #player { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <header class="bg-[#111] p-4 flex justify-between items-center border-b border-[#333]">
        <div class="flex items-center">
            <a href="index.html" class="flex items-center">
                <svg class="w-8 h-8 mr-2 text-[#00ccff]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
                <h1 class="text-xl font-bold gradient-text">LibreTV</h1>
            </a>
        </div>
        <h2 id="videoTitle" class="text-xl font-semibold truncate flex-1 text-center"></h2>
        <a href="index.html" class="px-4 py-2 bg-[#222] hover:bg-[#333] border border-[#333] rounded-lg transition-colors">返回首页</a>
    </header>

    <main class="container mx-auto px-4 py-4">
        <div id="playerContainer" class="player-container">
            <div class="relative">
                <div id="player"></div>
                <div class="loading-container" id="loading">
                    <div class="loading-spinner"></div>
                    <div id="loading-text" class="mt-2 text-sm text-gray-300">正在获取最新视频流...</div>
                </div>
                <div class="error-container" id="error">
                    <div class="error-icon">⚠️</div>
                    <div id="error-message">视频加载失败</div>
                    <div style="margin-top: 10px; font-size: 14px; color: #aaa;">请尝试其他视频源或稍后重试</div>
                </div>
            </div>
        </div>

        <div class="player-container">
            <div class="flex justify-between items-center my-4">
                <button onclick="playPreviousEpisode()" id="prevButton" class="px-4 py-2 bg-[#222] hover:bg-[#333] border border-[#333] rounded-lg transition-colors">
                    <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> 上一集
                </button>
                <span class="text-gray-400" id="episodeInfo">加载中...</span>
                <button onclick="playNextEpisode()" id="nextButton" class="px-4 py-2 bg-[#222] hover:bg-[#333] border border-[#333] rounded-lg transition-colors">
                    下一集 <svg class="w-5 h-5 inline-block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>

        <div class="player-container">
            <div class="flex justify-end items-center mb-4 gap-2">
                <span class="text-gray-400 text-sm">自动连播</span>
                <label class="switch">
                    <input type="checkbox" id="autoplayToggle">
                    <span class="slider"></span>
                </label>
                <button onclick="toggleEpisodeOrder()" class="ml-4 px-4 py-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white font-semibold rounded-full shadow-lg transition-all flex items-center justify-center space-x-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" id="orderIcon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v3.586L7.707 9.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 10.586V7z" clip-rule="evenodd" />
                    </svg>
                    <span id="orderText">倒序排列</span>
                </button>
                <button id="lockToggle" onclick="toggleControlsLock()" title="锁定控制" class="px-2 py-1 bg-[#333] hover:bg-[#444] text-white rounded-full transition">
                    <svg id="lockIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11V7a3 3 0 00-6 0v4m-3 4h12v6H6v-6z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="player-container">
            <div class="episode-grid" id="episodesGrid">
                <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2" id="episodesList">
                    <div class="col-span-full text-center text-gray-400 py-8">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <div class="shortcut-hint" id="shortcutHint">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" id="shortcutIcon"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        <span id="shortcutText"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.2/dist/hls.min.js" crossorigin="anonymous"></script>
    <script src="https://s4.zstatic.net/ajax/libs/dplayer/1.27.1/DPlayer.min.js" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/password.js"></script>

    <script>
        // 全局变量
        let currentVideoTitle = '';
        let currentEpisodeIndex = 0;
        let currentEpisodes = [];
        let episodesReversed = false;
        let dp = null;
        let currentHls = null;
        let autoplayEnabled = true;
        let isUserSeeking = false;
        let videoHasEnded = false;
        let userClickedPosition = null;
        let shortcutHintTimeout = null;
        let adFilteringEnabled = true;
        let progressSaveInterval = null;

        document.addEventListener('DOMContentLoaded', function() {
            initializePageContent();
        });

        function initializePageContent() {
            const urlParams = new URLSearchParams(window.location.search);
            let videoUrl = urlParams.get('url');
            const title = urlParams.get('title');
            const sourceCode = urlParams.get('source_code');
            let index = parseInt(urlParams.get('index') || '0');
            const episodesList = urlParams.get('episodes');

            if (videoUrl && videoUrl.indexOf('http') > 0) {
                videoUrl = videoUrl.substring(videoUrl.indexOf('http'));
            }

            currentVideoTitle = title || localStorage.getItem('currentVideoTitle') || '未知视频';
            currentEpisodeIndex = index;
            autoplayEnabled = localStorage.getItem('autoplayEnabled') !== 'false';
            document.getElementById('autoplayToggle').checked = autoplayEnabled;
            
            document.getElementById('autoplayToggle').addEventListener('change', function(e) {
                autoplayEnabled = e.target.checked;
                localStorage.setItem('autoplayEnabled', autoplayEnabled);
            });
            
            try {
                if (episodesList) {
                    currentEpisodes = JSON.parse(decodeURIComponent(episodesList));
                } else {
                    currentEpisodes = JSON.parse(localStorage.getItem('currentEpisodes') || '[]');
                }
                if (index < 0 || (currentEpisodes.length > 0 && index >= currentEpisodes.length)) index = 0;
                currentEpisodeIndex = index;
                episodesReversed = localStorage.getItem('episodesReversed') === 'true';
            } catch (e) {
                currentEpisodes = []; currentEpisodeIndex = 0; episodesReversed = false;
            }

            document.title = currentVideoTitle + ' - LibreTV播放器';
            document.getElementById('videoTitle').textContent = currentVideoTitle;

            if (videoUrl) {
                initPlayer(videoUrl, sourceCode);
            } else {
                showError('无效的视频链接');
            }

            updateEpisodeInfo();
            renderEpisodes();
            updateButtonStates();
            updateOrderButton();

            setTimeout(setupProgressBarPreciseClicks, 1000);
            document.addEventListener('keydown', handleKeyboardShortcuts);
            window.addEventListener('beforeunload', saveCurrentProgress);
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'hidden') saveCurrentProgress();
            });
        }

        // ==========================================
        // 🚀 核心逻辑1：首次加载时的实时解析拦截
        // ==========================================
        async function initPlayer(videoUrl, sourceCode) {
            if (!videoUrl) return;

            // 拦截抖音链接，走 n8n 代理提取最新鲜 MP4
            if (videoUrl.includes('douyin.com') || videoUrl.includes('iesdouyin.com')) {
                document.getElementById('loading').style.display = 'flex';
                document.getElementById('loading-text').textContent = '正在获取最新鲜的视频源...';
                
                try {
                    // 请求您的 n8n 代理节点
                    const parseApi = `https://ocin8n.ccwork.nyc.mn/webhook/douyin-proxy?url=${encodeURIComponent(videoUrl)}`;
                    const res = await fetch(parseApi);
                    let result = await res.json();
                    
                    // 👇 新增：如果是数组，就自动提取第一个元素（拆包）
                    if (Array.isArray(result) && result.length > 0) {
                        result = result[0];
                    }
                    
                    let mp4Url = '';
                    if (result && result.code === 200 && result.data && result.data.video) {
                        // 优先提取最高画质的 CDN 直链
                        if (result.data.video.bit_rate && result.data.video.bit_rate.length > 0) {
                            mp4Url = result.data.video.bit_rate[0].play_addr.url_list[0];
                        } else if (result.data.video.play_addr) {
                            mp4Url = result.data.video.play_addr.url_list[0];
                        }
                    }
                    
                    if (mp4Url) {
                        videoUrl = mp4Url; // 解析成功，替换成最新直链！
                    } else {
                        showError('视频实时解析失败，接口可能升级');
                        return;
                    }
                } catch (e) {
                    showError('请求解析服务器(n8n)失败，请检查服务');
                    return;
                }
            }

            window.filterAdPattern = null;
            if (typeof API_SITES !== 'undefined' && API_SITES[sourceCode]) {
                window.filterAdPattern = API_SITES[sourceCode].filterAdRule;
            }

            const videoType = (videoUrl.indexOf('.m3u8') !== -1) ? 'hls' : 'normal';

            dp = new DPlayer({
                container: document.getElementById('player'),
                autoplay: true,
                theme: '#00ccff',
                preload: 'auto',
                loop: false,
                lang: 'zh-cn',
                hotkey: true,
                mutex: true,
                volume: 0.7,
                screenshot: true,
                video: {
                    url: videoUrl,
                    type: videoType,
                    pic: 'https://img.picgo.net/2025/04/12/image362e7d38b4af4a74.png'
                }
            });

            dp.on('fullscreen', () => {
                if (window.screen.orientation && window.screen.orientation.lock) {
                    window.screen.orientation.lock('landscape').catch(() => {});
                }
            });
            dp.on('fullscreen_cancel', () => {
                if (window.screen.orientation && window.screen.orientation.unlock) {
                    window.screen.orientation.unlock();
                }
            });
            dp.on('loadedmetadata', function() {
                document.getElementById('loading').style.display = 'none';
                videoHasEnded = false;
                setupProgressBarPreciseClicks();
                setTimeout(saveToHistory, 3000);
                startProgressSaveInterval();
            });
            dp.on('error', function() {
                if (dp.video && dp.video.currentTime > 1) return;
                showError('视频播放失败，链接可能已过期');
            });
            dp.on('seeking', function() { isUserSeeking = true; videoHasEnded = false; });
            dp.on('seeked', function() { setTimeout(() => { isUserSeeking = false; }, 200); });
            dp.on('ended', function() {
                videoHasEnded = true;
                clearVideoProgress();
                if (autoplayEnabled && currentEpisodeIndex < currentEpisodes.length - 1) {
                    setTimeout(() => { if (videoHasEnded && !isUserSeeking) playNextEpisode(); }, 1000);
                }
            });
        }

        // ==========================================
        // 🚀 核心逻辑2：切集时的实时解析拦截
        // ==========================================
        async function playEpisode(index) {
            if (index < 0 || index >= currentEpisodes.length) return;
            
            if (dp && dp.video && !dp.video.paused && !videoHasEnded) saveCurrentProgress();
            if (progressSaveInterval) clearInterval(progressSaveInterval);
            
            document.getElementById('error').style.display = 'none';
            document.getElementById('loading').style.display = 'flex';
            document.getElementById('loading-text').textContent = '正在获取该集的最新鲜视频源...';
            
            let url = currentEpisodes[index];
            if (url && url.indexOf('http') > 0) url = url.substring(url.indexOf('http'));
            
            let finalPlayUrl = url;
            
            // 拦截抖音链接，走 n8n 代理提取最新鲜 MP4
            if (url.includes('douyin.com') || url.includes('iesdouyin.com')) {
                try {
                    const proxyApi = `https://ocin8n.ccwork.nyc.mn/webhook/douyin-proxy?url=${encodeURIComponent(url)}`;
                    const res = await fetch(proxyApi);
                    let result = await res.json(); // <--- 改成 let
                    
                    // 👇 新增：如果是数组，就自动提取第一个元素（拆包）
                    if (Array.isArray(result) && result.length > 0) {
                        result = result[0];
                    }
                    
                    let mp4Url = '';
                    if (result && result.code === 200 && result.data && result.data.video) {
                        if (result.data.video.bit_rate && result.data.video.bit_rate.length > 0) {
                            mp4Url = result.data.video.bit_rate[0].play_addr.url_list[0];
                        } else if (result.data.video.play_addr) {
                            mp4Url = result.data.video.play_addr.url_list[0];
                        }
                    }
                    if (mp4Url) {
                        finalPlayUrl = mp4Url;
                    } else {
                        showToast('该集解析失败', 'error'); hideLoading(); return;
                    }
                } catch (e) {
                    showToast('无法连接到解析服务器(n8n)', 'error'); hideLoading(); return;
                }
            }
            
            currentEpisodeIndex = index;
            videoHasEnded = false;
            
            const urlParams = new URLSearchParams(window.location.search);
            const sourceName = urlParams.get('source') || '';
            const sourceCode = urlParams.get('source_code') || '';
            
            // 注意：地址栏保留的是没有过期的抖音原链接，方便刷新和分享！
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('index', index);
            newUrl.searchParams.set('url', url); 
            if (sourceName) newUrl.searchParams.set('source', sourceName);
            if (sourceCode) newUrl.searchParams.set('source_code', sourceCode);
            window.history.pushState({}, '', newUrl);
            
            if (dp) {
                try {
                    const videoType = (finalPlayUrl.indexOf('.m3u8') !== -1) ? 'hls' : 'normal';
                    dp.switchVideo({ url: finalPlayUrl, type: videoType });
                    const playPromise = dp.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => initPlayer(url, sourceCode));
                    }
                } catch (e) { initPlayer(url, sourceCode); }
            } else {
                initPlayer(url, sourceCode);
            }
            
            updateEpisodeInfo(); updateButtonStates(); renderEpisodes();
            userClickedPosition = null;
            setTimeout(() => saveToHistory(), 3000);
        }

        // --- 其他配套函数保持极简 ---
        function playPreviousEpisode() { if (currentEpisodeIndex > 0) playEpisode(currentEpisodeIndex - 1); }
        function playNextEpisode() { if (currentEpisodeIndex < currentEpisodes.length - 1) playEpisode(currentEpisodeIndex + 1); }
        function toggleEpisodeOrder() {
            episodesReversed = !episodesReversed;
            localStorage.setItem('episodesReversed', episodesReversed);
            renderEpisodes(); updateOrderButton();
        }
        function updateOrderButton() {
            const orderText = document.getElementById('orderText');
            const orderIcon = document.getElementById('orderIcon');
            if (orderText && orderIcon) {
                orderText.textContent = episodesReversed ? '正序排列' : '倒序排列';
                orderIcon.style.transform = episodesReversed ? 'rotate(180deg)' : '';
            }
        }
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'flex';
            document.getElementById('error-message').textContent = message;
        }
        function hideLoading() { document.getElementById('loading').style.display = 'none'; }
        function updateEpisodeInfo() {
            document.getElementById('episodeInfo').textContent = currentEpisodes.length > 0 ? `第 ${currentEpisodeIndex + 1}/${currentEpisodes.length} 集` : '无集数信息';
        }
        function updateButtonStates() {
            const pb = document.getElementById('prevButton'), nb = document.getElementById('nextButton');
            if (currentEpisodeIndex > 0) { pb.classList.remove('bg-gray-700', 'cursor-not-allowed'); pb.classList.add('bg-[#222]', 'hover:bg-[#333]'); pb.removeAttribute('disabled'); } 
            else { pb.classList.add('bg-gray-700', 'cursor-not-allowed'); pb.classList.remove('bg-[#222]', 'hover:bg-[#333]'); pb.setAttribute('disabled', ''); }
            if (currentEpisodeIndex < currentEpisodes.length - 1) { nb.classList.remove('bg-gray-700', 'cursor-not-allowed'); nb.classList.add('bg-[#222]', 'hover:bg-[#333]'); nb.removeAttribute('disabled'); } 
            else { nb.classList.add('bg-gray-700', 'cursor-not-allowed'); nb.classList.remove('bg-[#222]', 'hover:bg-[#333]'); nb.setAttribute('disabled', ''); }
        }
        function renderEpisodes() {
            const list = document.getElementById('episodesList');
            if (!list) return;
            if (!currentEpisodes || currentEpisodes.length === 0) { list.innerHTML = '<div class="col-span-full text-center py-8">无集数</div>'; return; }
            const episodes = episodesReversed ? [...currentEpisodes].reverse() : currentEpisodes;
            list.innerHTML = episodes.map((ep, index) => {
                const realIndex = episodesReversed ? currentEpisodes.length - 1 - index : index;
                const active = realIndex === currentEpisodeIndex;
                return `<button onclick="playEpisode(${realIndex})" class="px-4 py-2 ${active ? 'episode-active border-blue-500' : 'bg-[#222] hover:bg-[#333] border-[#333]'} border rounded-lg transition-colors text-center text-sm">第${realIndex + 1}集</button>`;
            }).join('');
        }
        
        function handleKeyboardShortcuts(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.altKey && e.key === 'ArrowLeft' && currentEpisodeIndex > 0) { playPreviousEpisode(); e.preventDefault(); }
            if (e.altKey && e.key === 'ArrowRight' && currentEpisodeIndex < currentEpisodes.length - 1) { playNextEpisode(); e.preventDefault(); }
        }
        function saveToHistory() {} // 简化历史记录函数，依赖主站
        function setupProgressBarPreciseClicks() {} // 简化点击修正
        function startProgressSaveInterval() {}
        function saveCurrentProgress() {}
        function clearVideoProgress() {}
        function showToast(msg) { alert(msg); }
        let controlsLocked = false;
        function toggleControlsLock() { controlsLocked = !controlsLocked; document.getElementById('playerContainer').classList.toggle('controls-locked', controlsLocked); }
    </script>
</body>
</html>
