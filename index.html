    <script>
        // 创建全局环境变量对象
        window.__ENV__ = window.__ENV__ || {};
        
        // 注入服务器端环境变量 (将由服务器端替换)

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const resultsDiv = document.getElementById('results');
        const filterContainer = document.getElementById('sourceFilterContainer');
        const filterList = document.getElementById('sourceFilterList');
        
        if (!resultsDiv || !filterContainer) return;

        let debounceTimer;
        
        // 核心：监听结果区域的变化，自动生成对应的过滤按钮
        const observer = new MutationObserver(() => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                buildFilters();
            }, 300); // 延迟300毫秒，等待视频卡片全部渲染完毕
        });
        
        observer.observe(resultsDiv, { childList: true });

        // 构建过滤按钮的函数
        function buildFilters() {
            const cards = resultsDiv.children;
            if (cards.length === 0) {
                filterContainer.classList.add('hidden');
                return;
            }

            // 1. 智能提取当前页面搜索结果中包含的所有来源
            const sourceSet = new Set();
            Array.from(cards).forEach(card => {
                if (typeof API_SITES !== 'undefined') {
                    Object.values(API_SITES).forEach(site => {
                        // 匹配卡片底部的来源文字
                        if (card.innerText.includes(site.name)) {
                            sourceSet.add(site.name);
                        }
                    });
                }
            });

            const sourceArray = Array.from(sourceSet);
            // 如果搜索结果只来自1个源，就没必要显示过滤栏了，保持清爽
            if (sourceArray.length <= 1) {
                filterContainer.classList.add('hidden');
                return;
            }

            // 2. 动态生成按钮 HTML（贴合网站暗色主题）
            filterContainer.classList.remove('hidden');
            let html = `<button onclick="filterBySource('全部')" class="source-filter-btn px-5 py-1.5 rounded-md text-sm font-medium transition-colors bg-pink-600 text-white shadow-md">全部</button>`;
            
            sourceArray.forEach(src => {
                html += `<button onclick="filterBySource('${src}')" class="source-filter-btn px-5 py-1.5 rounded-md text-sm font-medium transition-colors bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white border border-gray-700">${src}</button>`;
            });
            
            filterList.innerHTML = html;
        }
        
        // 3. 挂载全局过滤函数（通过纯前端隐藏显示，实现毫秒级秒切）
        window.filterBySource = function(sourceName) {
            const cards = resultsDiv.children;
            let visibleCount = 0;
            
            Array.from(cards).forEach(card => {
                if (sourceName === '全部' || card.innerText.includes(sourceName)) {
                    card.style.display = ''; // 显示
                    visibleCount++;
                } else {
                    card.style.display = 'none'; // 隐藏
                }
            });
            
            // 联动更新页面右侧的总数统计
            const countEl = document.getElementById('searchResultsCount');
            if(countEl) countEl.innerText = visibleCount;
            
            // 更新按钮的高亮选中状态
            const btns = filterList.querySelectorAll('.source-filter-btn');
            btns.forEach(btn => {
                if (btn.innerText === sourceName) {
                    btn.className = 'source-filter-btn px-5 py-1.5 rounded-md text-sm font-medium transition-colors bg-pink-600 text-white shadow-md';
                } else {
                    btn.className = 'source-filter-btn px-5 py-1.5 rounded-md text-sm font-medium transition-colors bg-gray-800 text-gray-300 hover:bg-gray-700 hover:text-white border border-gray-700';
                }
            });
        };
    });
    </script>
    </body>
</html>
